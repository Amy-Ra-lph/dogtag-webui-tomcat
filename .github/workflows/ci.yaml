name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc -b --noEmit

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Verify build output
        run: |
          test -f dist/index.html
          ls dist/assets/*.js dist/assets/*.css

  container:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Build container
        run: podman build -t dogtag-webui-tomcat .

      - name: Verify container contents
        run: |
          CID=$(podman create dogtag-webui-tomcat)
          podman cp "$CID:/webapp" /tmp/webapp-check
          podman rm "$CID"
          test -f /tmp/webapp-check/index.html
          test -f /tmp/webapp-check/WEB-INF/web.xml
